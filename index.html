<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fake News Alert</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="image-banner" id="banner"></div>
  <div class="alert-container">
    <p class="blinking-alert">🚨....FAKE NEWS ALERT.... 🚨</p>
  </div>

  <div class="ticker">
    <div class="headline">
     • Verify Before You Believe • Stay Informed • Think Before You Share •
    </div>
  </div>

  <div class="container">
    <h1>Check News Authenticity</h1>
    <textarea id="textInput" placeholder="Enter a news headline or paragraph..."></textarea>

    <button id="verifyBtn">🔍 Verify Now</button>

    <div id="result" class="hidden"></div>
  </div>

  <script src="tool.js"></script>
</body>
</html>
